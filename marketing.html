<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>StimmApp</title>
	<meta name="description" content="Download StimmApp on the App Store or Google Play.">
	<style>
		:root {
			color-scheme: light;
			--bg-top: #eef7f2;
			--bg-bottom: #ffffff;
			--card: rgba(255, 255, 255, 0.9);
			--text: #123126;
			--muted: #5d7268;
			--accent: #0b7a3d;
			--accent-hover: #095d2f;
			--border: rgba(11, 122, 61, 0.12);
			--shadow: 0 20px 50px rgba(18, 49, 38, 0.12);
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 24px;
			font-family: Poppins, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at top, rgba(11, 122, 61, 0.12), transparent 35%),
				linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
		}

		.card {
			width: min(100%, 460px);
			padding: 36px 28px;
			text-align: center;
			background: var(--card);
			border: 1px solid var(--border);
			border-radius: 28px;
			box-shadow: var(--shadow);
			backdrop-filter: blur(10px);
		}

		.logo {
			width: 104px;
			height: 104px;
			border-radius: 24px;
			display: block;
			margin: 0 auto 20px;
			box-shadow: 0 12px 24px rgba(11, 122, 61, 0.15);
		}

		h1 {
			margin: 0;
			font-size: clamp(2rem, 6vw, 2.5rem);
			line-height: 1.05;
			letter-spacing: -0.04em;
		}

		p {
			margin: 14px 0 0;
			color: var(--muted);
			font-size: 1rem;
		}

		.actions {
			margin-top: 28px;
			display: grid;
			gap: 12px;
		}

		.button {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			min-height: 54px;
			padding: 0 18px;
			border-radius: 16px;
			background: var(--accent);
			color: #ffffff;
			text-decoration: none;
			font-weight: 700;
			transition: transform 140ms ease, background 140ms ease, box-shadow 140ms ease;
			box-shadow: 0 10px 24px rgba(11, 122, 61, 0.18);
		}

		.button:hover {
			background: var(--accent-hover);
			transform: translateY(-1px);
		}

		.button.secondary {
			background: #ffffff;
			color: var(--accent);
			border: 1px solid rgba(11, 122, 61, 0.24);
			box-shadow: none;
		}

		.button.secondary:hover {
			background: #f6fbf8;
		}

		.footnote {
			margin-top: 16px;
			font-size: 0.85rem;
			color: #7d9087;
		}

		@media (max-width: 480px) {
			.card {
				padding: 28px 20px;
				border-radius: 24px;
			}
		}
	</style>
</head>

<body>
	<main class="card">
		<img id="logo" class="logo" src="./icons/Icon-512.png" alt="StimmApp logo">
		<h1>StimmApp</h1>
		<p id="tagline">Create petitions and polls. Download the app on your preferred store.</p>

		<div class="actions">
			<a id="app-store-link" class="button" href="https://apps.apple.com/app/stimmapp/id6759249651" target="_blank"
				rel="noopener noreferrer">Download on the App Store</a>
			<a id="play-store-link" class="button secondary"
				href="https://play.google.com/store/apps/details?id=de.lemarq.stimmapp" target="_blank"
				rel="noopener noreferrer">Get it on Google Play</a>
		</div>

		<p id="footnote" class="footnote">Replace the App Store URL in <code>web/marketing.html</code> with your final
			iOS listing link.</p>
	</main>
	<script>
		const isEnglishHost = window.location.hostname.toLowerCase().includes('vivot.net');
		const copy = isEnglishHost ? {
			lang: 'en',
			title: 'StimmApp',
			logoAlt: 'StimmApp logo',
			tagline: 'Create petitions and polls. Download the app on your preferred store.',
			appStore: 'Download on the App Store',
			playStore: 'Get it on Google Play',
			footnote: 'Replace the App Store URL in <code>web/marketing.html</code> with your final iOS listing link.'
		} : {
			lang: 'de',
			title: 'StimmApp',
			logoAlt: 'StimmApp Logo',
			tagline: 'Erstelle Petitionen und Umfragen. Lade die App in deinem bevorzugten Store herunter.',
			appStore: 'Im App Store laden',
			playStore: 'Bei Google Play laden',
			footnote: 'Ersetze die App-Store-URL in <code>web/marketing.html</code> durch deinen finalen iOS-Link.'
		};

		document.documentElement.lang = copy.lang;
		document.title = copy.title;
		document.getElementById('logo').alt = copy.logoAlt;
		document.getElementById('tagline').textContent = copy.tagline;
		document.getElementById('app-store-link').textContent = copy.appStore;
		document.getElementById('play-store-link').textContent = copy.playStore;
		document.getElementById('footnote').innerHTML = copy.footnote;
	</script>
</body>

</html>
